<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVASCRIPT</title>
    <script lang="Javascript">
        function text()
        {

            x.innerHTML="Welcome to DOM manipluation";
        }
