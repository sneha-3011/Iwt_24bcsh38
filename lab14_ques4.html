<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question-4(Counter)</title>
    <style>
        #box{
            width:20px;
        }
    </style>
    <script>
        function increase(){
            var x=document.getElementById("box");
            var value=parseInt(x.value);
            x.value=value+1;
           
        }
        function decrease(){
            var x=document.getElementById("box");
            var value=parseInt(x.value);
            x.value=value-1;
        }

    </script>
</head>
<body>
    <button id="btn2" onclick="decrease()">-</button>
    <input type="text" id="box" value="0">
    <button id="btn1" onclick="increase()">+</button>
    
</body>
</html>
