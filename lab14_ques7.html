<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question-7(Registration form)</title>
    <style>
        div{
            width:300px;
            border:1px solid;
            padding:10px;
        }

    </style>
    <script src="lab14_ques7.js" defer></script>
</head>
<body>
    <div>
        <center><h1>Registration form</h1></center>
    <form name="Registation" method="Post" id="regform" >
        <table cellpadding=5>
        <tr>
            <td>Name:</td>
            <td><input type="text" placeholder="Enter name" id="name"></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td id="gender">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Others
            </td>
        </tr>
        <tr>
            <td>Mobile:</td>
            <td><input type="tel" name="mobile" id="number"></td>
        </tr>
        <tr>
            <td>Address:</td>
            <td><textarea name="address" cols="20" id="add"></textarea></td>
        </tr>

        <tr>
            <td>Country:</td>
            <td>
                <select id="country">
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Email:</td>
            <td><input type="email" id="mail"></td>
        </tr>

        <tr>
            <td>Password:</td>
            <td><input type="password" id="password"></td>
        </tr>

        <tr>
            <td></td>
            <td><input type="submit" value="Register"></td>
        </tr>
        </table>
    </form>
     
    </div>
    
</body>
</html>
