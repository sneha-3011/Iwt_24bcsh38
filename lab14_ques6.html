<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency converter </title>
    <style>
        #btn{ 
            background-color: black;
            color:white;
            padding:5px 10px;
            
        }
        div{
            width:300px;
            border:2px solid;
            padding:10px 20px;
        }
        #fromcurrency{
            width:100%;
            height:30px;
        }
        #tocurrency{
            width:100%;
            height:30px;
        }
        #amount{
            width:100%;
            height:30px;
        }
        #btn{
            width:100%;
            height:30px;
            font-size: large;
        }
        #result{
            width:100%;
            height:30px;
        }
    </style>
    <script>
        function convert(){
            var amt=document.getElementById("amount").value;
            var from=document.getElementById("fromcurrency").value;
            var to=document.getElementById("tocurrency").value;
            if(amt==="" || from===""|| to==="")
        {
            alert("Please fill all fields.");
            return;
        }
        var rates={
            USD:1,
            EUR:0.92,
            GBP:0.78,
            INR:83,
            AUD:1.5
        };
        var convertamt=(amt/rates[from])*rates[to];
        document.getElementById("result").value = convertamt.toFixed(2) + " " + to;

        }
        
    </script>
</head>
<body>
    <div>
        <center><h1>Currency Converter</h1></center>
    From:
    <br>
    <br>
    <select id="fromcurrency">
        <option value="USD">USD</option>
        <option value="INR">INR</option>
        <option value="AUD">AUD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
    </select>
    <br>
    <br>
    <input type="text" id="amount" placeholder="Enter amount">
    <br>
    <br>
    To:
    <br>
    <br>
    <select id="tocurrency">
        <option value="USD">USD</option>
        <option value="AUD">AUD</option>
        <option value="GBP">GBP</option>
        <option value="INR">INR</option>
        <option value="EUR">EUR</option>
    </select>
    <br>
    <br>
    <input type="text" id="result" readonly>
    <br>
    <br>
    <button id="btn" onclick="convert()">Convert</button>
    
    </div>

    
</body>
</html>
